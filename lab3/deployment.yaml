apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab3-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lab3-web
  template:
    metadata:
      labels:
        app: lab3-web
    spec:
      nodeSelector:
        node-role: general
      containers:
      - name: web
        image: lab3-multi
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10